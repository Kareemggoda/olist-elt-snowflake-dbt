version: 2

sources:
  - name: raw
    database: olist_db
    schema: raw
    freshness:
      warn_after:  { count: 24, period: hour }
      error_after: { count: 48, period: hour }
    loaded_at_field: _load_timestamp

    tables:
      - name: orders
        description: "Raw orders from Olist"
        columns:
          - name: order_id
            tests: [unique, not_null]
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests:
              - accepted_values:
                  values: ['delivered','shipped','canceled','invoiced',
                           'processing','unavailable','created','approved']

      - name: customers
        description: "Raw customers"
        columns:
          - name: customer_id
            tests: [unique, not_null]

      - name: products
        description: "Raw products"
        columns:
          - name: product_id
            tests: [unique, not_null]

      - name: sellers
        description: "Raw sellers"
        columns:
          - name: seller_id
            tests: [unique, not_null]

      - name: order_items
        description: "Raw order line items"
        columns:
          - name: order_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]

      - name: order_payments
        description: "Raw payment records"
        columns:
          - name: order_id
            tests: [not_null]

      - name: order_reviews
        description: "Raw review records"
        columns:
          - name: review_id
            tests: [not_null]

      - name: geolocation
        description: "Zip-code lat/lon mapping"