version: 2

models:
  - name: stg_orders
    description: "Cleaned orders with derived delivery metrics"
    columns:
      - name: order_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered','shipped','canceled','invoiced',
                       'processing','unavailable','created','approved']
      - name: actual_delivery_days
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 365
              row_condition: "order_status = 'delivered'"
              config:
                severity: warn

  - name: stg_customers
    description: "Cleaned customers with state/city standardisation"
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_unique_id
        tests: [not_null]

  - name: stg_products
    description: "Cleaned products with English category name"
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: stg_sellers
    description: "Cleaned seller records"
    columns:
      - name: seller_id
        tests: [unique, not_null]

  - name: stg_order_items
    description: "Cleaned order line items"
    columns:
      - name: order_item_sk
        tests: [unique, not_null]
      - name: price
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000

  - name: stg_order_payments
    description: "Cleaned payment records"
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_value
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000

  - name: stg_order_reviews
    description: "Cleaned review records"
    columns:
      - name: review_id
        tests: [not_null]
      - name: review_score
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_geolocation
    description: "Zip-code coordinates, deduplicated to one row per zip"
    columns:
      - name: zip_code_prefix
        tests: [unique, not_null]
